<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Sync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3147;
      --text: #e2e4ef;
      --muted: #8b90a0;
      --accent: #5e6ad2;
      --accent-hover: #7b84e0;
      --green: #26b5a0;
      --yellow: #f0a030;
      --red: #e05252;
      --blue: #4ea8de;
      --purple: #9b59b6;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .last-sync { color: var(--muted); font-size: 12px; }

    /* Sync button */
    .btn-sync { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
    .btn-sync:hover { background: var(--accent-hover); }
    .btn-sync:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    .btn-sync.syncing .spinner { display: block; }
    .btn-sync.syncing .btn-icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats */
    .stats-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 32px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Main */
    .main { padding: 20px 24px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
    .tab { padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; color: var(--muted); font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
    .search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; width: 280px; outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px; outline: none; cursor: pointer; }
    .count-label { color: var(--muted); font-size: 12px; margin-left: auto; }

    /* Table */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(94,106,210,0.04); }

    /* Issue title */
    .issue-title { display: flex; flex-direction: column; gap: 2px; }
    .issue-title a { color: var(--text); text-decoration: none; font-weight: 500; }
    .issue-title a:hover { color: var(--accent); }
    .issue-id { color: var(--muted); font-size: 11px; font-family: monospace; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .priority-0 { color: var(--muted); }
    .priority-1 { color: var(--red); }
    .priority-2 { color: var(--yellow); }
    .priority-3 { color: var(--blue); }
    .priority-4 { color: var(--muted); }

    /* Project pill */
    .project-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; }
    .project-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Team badge */
    .team-badge { color: var(--muted); font-size: 12px; font-family: monospace; background: var(--surface2); padding: 2px 7px; border-radius: 4px; }

    /* State badge */
    .state-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
    .state-icon { width: 10px; height: 10px; border-radius: 50%; }

    /* Assignee */
    .assignee { display: flex; align-items: center; gap: 8px; }
    .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--accent); flex-shrink: 0; }

    /* Projects grid */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; display: flex; flex-direction: column; gap: 10px; transition: border-color 0.15s; }
    .project-card:hover { border-color: var(--accent); }
    .project-card-header { display: flex; align-items: flex-start; gap: 10px; }
    .project-color-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
    .project-card-title { font-weight: 600; font-size: 15px; }
    .project-card-title a { color: var(--text); text-decoration: none; }
    .project-card-title a:hover { color: var(--accent); }
    .project-card-desc { color: var(--muted); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .project-card-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .project-state { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }
    .project-issue-count { color: var(--muted); font-size: 12px; }

    /* Sync log */
    .sync-log-section { margin-top: 24px; }
    .sync-log-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .sync-log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 16px; }
    .sync-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
    .sync-status.completed { background: rgba(38,181,160,0.15); color: var(--green); }
    .sync-status.running { background: rgba(94,106,210,0.15); color: var(--accent); }
    .sync-status.error { background: rgba(224,82,82,0.15); color: var(--red); }
    .sync-log-info { color: var(--muted); font-size: 12px; }
    .sync-log-time { color: var(--muted); font-size: 12px; margin-left: auto; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

    /* Progress toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; min-width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 12px; transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
    .toast.visible { transform: translateY(0); opacity: 1; }
    .toast-icon { font-size: 18px; }
    .toast-text { flex: 1; }
    .toast-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
    .toast-sub { color: var(--muted); font-size: 12px; }

    /* Tabs content */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 16px; align-items: center; }
    .page-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .page-btn:hover { border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">⚡</div>
    <h1>Linear Sync</h1>
  </div>
  <div class="header-right">
    <span class="last-sync" id="lastSyncTime">Never synced</span>
    <button class="btn-sync" id="syncBtn" onclick="triggerSync()">
      <span class="btn-icon">↻</span>
      <div class="spinner"></div>
      Sync Now
    </button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-value" id="totalIssues">—</div>
    <div class="stat-label">Issues</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="totalProjects">—</div>
    <div class="stat-label">Projects</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="lastSyncCount">—</div>
    <div class="stat-label">Last Sync</div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('issues')">📋 Issues</div>
    <div class="tab" onclick="switchTab('projects')">📁 Projects</div>
  </div>

  <!-- Issues Tab -->
  <div class="tab-content active" id="tab-issues">
    <div class="toolbar">
      <input class="search-input" type="text" id="issueSearch" placeholder="🔍  Search issues..." oninput="debounceSearch()">
      <select class="filter-select" id="teamFilter" onchange="loadIssues()">
        <option value="">All Teams</option>
      </select>
      <select class="filter-select" id="projectFilter" onchange="loadIssues()">
        <option value="">All Projects</option>
      </select>
      <span class="count-label" id="issueCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Project</th>
            <th>Team</th>
            <th>State</th>
            <th>Priority</th>
            <th>Assignee</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody id="issuesBody">
          <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="issuesPagination"></div>
  </div>

  <!-- Projects Tab -->
  <div class="tab-content" id="tab-projects">
    <div class="toolbar">
      <input class="search-input" type="text" id="projectSearch" placeholder="🔍  Search projects..." oninput="renderProjects()">
      <span class="count-label" id="projectCount"></span>
    </div>
    <div class="projects-grid" id="projectsGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Loading...</div>
    </div>
  </div>

  <!-- Sync Log -->
  <div class="sync-log-section">
    <div class="sync-log-title">Sync History</div>
    <div id="syncLog"><div style="color:var(--muted);font-size:13px">No syncs yet</div></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">⚡</div>
  <div class="toast-text">
    <div class="toast-title" id="toastTitle">Syncing...</div>
    <div class="toast-sub" id="toastSub">Fetching from Linear</div>
  </div>
</div>

<script>
const PRIORITIES = {
  0: { label: 'No Priority', icon: '—', class: 'priority-0' },
  1: { label: 'Urgent', icon: '🔴', class: 'priority-1' },
  2: { label: 'High', icon: '🟠', class: 'priority-2' },
  3: { label: 'Medium', icon: '🔵', class: 'priority-3' },
  4: { label: 'Low', icon: '⚪', class: 'priority-4' },
};

let currentTab = 'issues';
let currentPage = 1;
let allProjects = [];
let searchTimer = null;
let activeSyncId = null;
let syncPollTimer = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'issues') || (i === 1 && tab === 'projects'));
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadIssues(); }, 300);
}

function formatDate(d) {
  if (!d) return '—';
  const date = new Date(d);
  const now = new Date();
  const diff = now - date;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  if (diff < 604800000) return `${Math.floor(diff/86400000)}d ago`;
  return date.toLocaleDateString();
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function projectStateColor(state) {
  const map = { planned: '#8b90a0', started: '#5e6ad2', paused: '#f0a030', completed: '#26b5a0', cancelled: '#e05252' };
  return map[state?.toLowerCase()] || '#8b90a0';
}

async function loadStats() {
  const data = await fetch('/api/stats').then(r => r.json());
  document.getElementById('totalIssues').textContent = data.totalIssues.toLocaleString();
  document.getElementById('totalProjects').textContent = data.totalProjects.toLocaleString();
  if (data.lastSync) {
    document.getElementById('lastSyncCount').textContent = `${data.lastSync.issues_synced} issues`;
    document.getElementById('lastSyncTime').textContent = `Last synced ${formatDate(data.lastSync.completed_at)}`;
  }
}

async function loadProjects() {
  const data = await fetch('/api/projects').then(r => r.json());
  allProjects = data.projects || [];
  
  // Populate project filter
  const pf = document.getElementById('projectFilter');
  pf.innerHTML = '<option value="">All Projects</option>';
  allProjects.forEach(p => {
    pf.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
  
  renderProjects();
}

function renderProjects() {
  const search = (document.getElementById('projectSearch')?.value || '').toLowerCase();
  const filtered = allProjects.filter(p => !search || p.name.toLowerCase().includes(search) || (p.description || '').toLowerCase().includes(search));
  document.getElementById('projectCount').textContent = `${filtered.length} projects`;
  
  if (!filtered.length) {
    document.getElementById('projectsGrid').innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📁</div><h3>No projects found</h3><p>Try syncing first or adjusting your search.</p></div>`;
    return;
  }
  
  document.getElementById('projectsGrid').innerHTML = filtered.map(p => `
    <div class="project-card">
      <div class="project-card-header">
        <div class="project-color-dot" style="background:${p.color || '#5e6ad2'}"></div>
        <div>
          <div class="project-card-title">
            <a href="${p.url}" target="_blank">${p.name}</a>
          </div>
        </div>
      </div>
      ${p.description ? `<div class="project-card-desc">${p.description}</div>` : ''}
      <div class="project-card-meta">
        <span class="project-state badge" style="background:${projectStateColor(p.state)}22;color:${projectStateColor(p.state)}">${p.state || 'unknown'}</span>
        <span class="project-issue-count">🎯 ${p.issue_count} issue${p.issue_count !== '1' ? 's' : ''}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:auto">${formatDate(p.updated_at)}</span>
      </div>
    </div>
  `).join('');
}

async function loadIssues() {
  const search = document.getElementById('issueSearch').value;
  const team = document.getElementById('teamFilter').value;
  const project = document.getElementById('projectFilter').value;
  const params = new URLSearchParams({ page: currentPage });
  if (search) params.set('search', search);
  if (team) params.set('team', team);
  if (project) params.set('project', project);
  
  const data = await fetch(`/api/issues?${params}`).then(r => r.json());
  const tbody = document.getElementById('issuesBody');
  
  if (!data.issues?.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📋</div><h3>No issues found</h3><p>Try syncing first or adjusting filters.</p></div></td></tr>`;
    document.getElementById('issueCount').textContent = '0 issues';
    document.getElementById('issuesPagination').innerHTML = '';
    return;
  }
  
  document.getElementById('issueCount').textContent = `${data.total.toLocaleString()} issues`;
  
  // Populate team filter from data
  const teams = [...new Set(data.issues.map(i => i.team_name).filter(Boolean))];
  const tf = document.getElementById('teamFilter');
  const currentTeam = tf.value;
  if (!currentTeam && teams.length) {
    tf.innerHTML = '<option value="">All Teams</option>' + teams.map(t => `<option value="${t}">${t}</option>`).join('');
  }
  
  tbody.innerHTML = data.issues.map(issue => {
    const priority = PRIORITIES[issue.priority] || PRIORITIES[0];
    const stateColor = issue.state_color || '#8b90a0';
    const projectBg = issue.project_color ? `${issue.project_color}22` : 'var(--surface2)';
    const projectColor = issue.project_color || 'var(--muted)';
    
    return `
      <tr>
        <td>
          <div class="issue-title">
            <a href="${issue.url}" target="_blank">${issue.title}</a>
            ${issue.team_key ? `<span class="issue-id">${issue.team_key}</span>` : ''}
          </div>
        </td>
        <td>
          ${issue.project_name ? `
            <span class="project-pill" style="background:${projectBg};color:${projectColor}">
              <span class="project-dot" style="background:${projectColor}"></span>
              ${issue.project_name}
            </span>` : '<span style="color:var(--muted)">—</span>'}
        </td>
        <td>${issue.team_name ? `<span class="team-badge">${issue.team_name}</span>` : '—'}</td>
        <td>
          <span class="state-badge">
            <span class="state-icon" style="background:${stateColor}"></span>
            ${issue.state_name || '—'}
          </span>
        </td>
        <td class="${priority.class}">${priority.icon} ${priority.label}</td>
        <td>
          ${issue.assignee_name ? `
            <div class="assignee">
              <div class="avatar">${initials(issue.assignee_name)}</div>
              <span>${issue.assignee_name}</span>
            </div>` : '<span style="color:var(--muted)">Unassigned</span>'}
        </td>
        <td style="color:var(--muted)">${formatDate(issue.updated_at)}</td>
      </tr>
    `;
  }).join('');
  
  // Pagination
  const totalPages = Math.ceil(data.total / data.limit);
  const pg = document.getElementById('issuesPagination');
  if (totalPages > 1) {
    pg.innerHTML = `
      <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>← Prev</button>
      <span class="page-info">Page ${currentPage} of ${totalPages}</span>
      <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Next →</button>
    `;
  } else {
    pg.innerHTML = '';
  }
}

function changePage(p) {
  currentPage = p;
  loadIssues();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function loadSyncLog() {
  const data = await fetch('/api/sync-log').then(r => r.json());
  const container = document.getElementById('syncLog');
  if (!data.logs?.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px">No syncs yet</div>';
    return;
  }
  container.innerHTML = data.logs.map(log => `
    <div class="sync-log-item">
      <span class="sync-status ${log.status}">${log.status}</span>
      <span class="sync-log-info">
        ${log.status === 'completed' ? `${log.issues_synced} issues, ${log.projects_synced} projects` : ''}
        ${log.status === 'error' ? log.error || 'Error occurred' : ''}
        ${log.status === 'running' ? 'In progress...' : ''}
      </span>
      <span class="sync-log-time">${formatDate(log.started_at)}</span>
    </div>
  `).join('');
}

function showToast(icon, title, sub) {
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastSub').textContent = sub;
  document.getElementById('toast').classList.add('visible');
}

function hideToast() {
  document.getElementById('toast').classList.remove('visible');
}

async function triggerSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.classList.add('syncing');
  btn.querySelector('span:not(.spinner)').textContent = 'Syncing...';
  showToast('⚡', 'Sync started', 'Fetching from Linear...');
  
  try {
    const data = await fetch('/api/sync', { method: 'POST' }).then(r => r.json());
    activeSyncId = data.syncId;
    pollSync();
  } catch (e) {
    showToast('❌', 'Sync failed', e.message);
    resetSyncBtn();
  }
}

async function pollSync() {
  if (!activeSyncId) return;
  try {
    const data = await fetch(`/api/sync/${activeSyncId}`).then(r => r.json());
    
    if (data.progress) {
      document.getElementById('toastSub').textContent = data.progress;
    }
    
    if (data.status === 'completed') {
      showToast('✅', 'Sync complete!', `${data.issues} issues, ${data.projects} projects synced`);
      setTimeout(hideToast, 4000);
      resetSyncBtn();
      loadStats();
      loadIssues();
      loadProjects();
      loadSyncLog();
      activeSyncId = null;
    } else if (data.status === 'error') {
      showToast('❌', 'Sync failed', data.error || 'Unknown error');
      setTimeout(hideToast, 5000);
      resetSyncBtn();
      loadSyncLog();
      activeSyncId = null;
    } else {
      syncPollTimer = setTimeout(pollSync, 1500);
    }
  } catch (e) {
    syncPollTimer = setTimeout(pollSync, 2000);
  }
}

function resetSyncBtn() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = false;
  btn.classList.remove('syncing');
  btn.querySelector('span:not(.spinner)').textContent = 'Sync Now';
}

// Init
async function init() {
  await Promise.all([loadStats(), loadProjects(), loadSyncLog()]);
  await loadIssues();
}

init();
</script>
</body>
</html>
