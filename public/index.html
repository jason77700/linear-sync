<!DOCTYPE html>
<html lang="en" class="bg-gray-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linear Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gray: {
              950: '#0b0d14',
              900: '#111318',
              850: '#161820',
              800: '#1c1f2b',
              750: '#222639',
              700: '#2a2e40',
              600: '#363b52',
              500: '#555b75',
              400: '#8b90a8',
              300: '#b0b4c8',
              200: '#d0d3e3',
              100: '#e8eaf2',
            },
            indigo: {
              600: '#5e6ad2',
              500: '#7b84e0',
              400: '#9ba3ec',
            }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen text-sm">

<!-- Header -->
<header class="sticky top-0 z-50 bg-gray-900 border-b border-gray-700 px-6 h-14 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-7 h-7 bg-indigo-600 rounded-md flex items-center justify-center text-base">⚡</div>
    <h1 class="text-base font-semibold text-gray-100">Linear Sync</h1>
  </div>
  <div class="flex items-center gap-4">
    <span class="text-xs text-gray-400" id="lastSyncTime">Never synced</span>
    <button id="syncBtn" onclick="triggerSync()"
      class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-xs font-medium px-4 py-2 rounded-lg transition-colors">
      <span id="btnIcon">↻</span>
      <svg id="btnSpinner" class="hidden spin w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full" viewBox="0 0 14 14"></svg>
      <span id="btnLabel">Sync Now</span>
    </button>
  </div>
</header>

<!-- Stats bar -->
<div class="bg-gray-900 border-b border-gray-700 px-6 py-3 flex gap-8">
  <div>
    <div class="text-xl font-bold text-gray-100" id="totalIssues">—</div>
    <div class="text-xs text-gray-400 uppercase tracking-wide mt-0.5">Issues</div>
  </div>
  <div>
    <div class="text-xl font-bold text-gray-100" id="totalProjects">—</div>
    <div class="text-xs text-gray-400 uppercase tracking-wide mt-0.5">Projects</div>
  </div>
  <div>
    <div class="text-xl font-bold text-gray-100" id="lastSyncCount">—</div>
    <div class="text-xs text-gray-400 uppercase tracking-wide mt-0.5">Last Sync</div>
  </div>
</div>

<!-- Main -->
<div class="px-6 py-5">

  <!-- Tabs -->
  <div class="flex gap-1 border-b border-gray-700 mb-5">
    <button onclick="switchTab('issues')" id="tab-issues-btn"
      class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-indigo-600 text-indigo-400 -mb-px transition-colors">
      📋 Issues
    </button>
    <button onclick="switchTab('projects')" id="tab-projects-btn"
      class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 -mb-px transition-colors">
      📁 Projects
    </button>
  </div>

  <!-- Issues Tab -->
  <div id="tab-issues" class="tab-content">
    <div class="flex items-center gap-3 mb-4 flex-wrap">
      <input id="issueSearch" type="text" placeholder="🔍  Search issues..."
        oninput="debounceSearch()"
        class="bg-gray-800 border border-gray-700 focus:border-indigo-600 text-gray-100 placeholder-gray-500 rounded-lg px-3 py-2 text-sm w-64 outline-none transition-colors">
      <select id="teamFilter" onchange="loadIssues()"
        class="bg-gray-800 border border-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm outline-none cursor-pointer">
        <option value="">All Teams</option>
      </select>
      <select id="projectFilter" onchange="loadIssues()"
        class="bg-gray-800 border border-gray-700 text-gray-200 rounded-lg px-3 py-2 text-sm outline-none cursor-pointer">
        <option value="">All Projects</option>
      </select>
      <span class="text-xs text-gray-500 ml-auto" id="issueCount"></span>
    </div>

    <div class="bg-gray-900 border border-gray-700 rounded-xl overflow-hidden">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-800">
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Title</th>
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Project</th>
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Team</th>
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">State</th>
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Priority</th>
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Assignee</th>
            <th class="px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide">Updated</th>
          </tr>
        </thead>
        <tbody id="issuesBody">
          <tr><td colspan="7" class="text-center py-10 text-gray-500">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="flex justify-center items-center gap-3 mt-4" id="issuesPagination"></div>
  </div>

  <!-- Projects Tab -->
  <div id="tab-projects" class="tab-content hidden">
    <div class="flex items-center gap-3 mb-4">
      <input id="projectSearch" type="text" placeholder="🔍  Search projects..."
        oninput="renderProjects()"
        class="bg-gray-800 border border-gray-700 focus:border-indigo-600 text-gray-100 placeholder-gray-500 rounded-lg px-3 py-2 text-sm w-64 outline-none transition-colors">
      <span class="text-xs text-gray-500 ml-auto" id="projectCount"></span>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="projectsGrid">
      <div class="col-span-full text-center py-10 text-gray-500">Loading...</div>
    </div>
  </div>

  <!-- Sync Log -->
  <div class="mt-8">
    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Sync History</div>
    <div id="syncLog" class="space-y-2">
      <div class="text-sm text-gray-500">No syncs yet</div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"
  class="fixed bottom-6 right-6 min-w-64 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3.5 shadow-2xl flex items-center gap-3 translate-y-24 opacity-0 transition-all duration-300 z-50">
  <div class="text-lg" id="toastIcon">⚡</div>
  <div class="flex-1">
    <div class="font-semibold text-sm text-gray-100" id="toastTitle">Syncing...</div>
    <div class="text-xs text-gray-400 mt-0.5" id="toastSub">Fetching from Linear</div>
  </div>
</div>

<script>
const PRIORITIES = {
  0: { label: 'No Priority', icon: '—', color: 'text-gray-500' },
  1: { label: 'Urgent',      icon: '🔴', color: 'text-red-400' },
  2: { label: 'High',        icon: '🟠', color: 'text-orange-400' },
  3: { label: 'Medium',      icon: '🔵', color: 'text-blue-400' },
  4: { label: 'Low',         icon: '⚪', color: 'text-gray-400' },
};

let currentPage = 1;
let allProjects = [];
let searchTimer = null;
let activeSyncId = null;

function switchTab(tab) {
  ['issues', 'projects'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}-btn`);
    if (t === tab) {
      btn.classList.replace('border-transparent', 'border-indigo-600');
      btn.classList.replace('text-gray-400', 'text-indigo-400');
    } else {
      btn.classList.replace('border-indigo-600', 'border-transparent');
      btn.classList.replace('text-indigo-400', 'text-gray-400');
    }
  });
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; loadIssues(); }, 300);
}

function fmtDate(d) {
  if (!d) return '—';
  const diff = Date.now() - new Date(d);
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
  if (diff < 604800000) return `${Math.floor(diff/86400000)}d ago`;
  return new Date(d).toLocaleDateString();
}

function initials(name) {
  return name ? name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2) : '?';
}

function hexToRgb(hex) {
  const r = parseInt(hex?.slice(1,3)||'5e',16);
  const g = parseInt(hex?.slice(3,5)||'6a',16);
  const b = parseInt(hex?.slice(5,7)||'d2',16);
  return `${r},${g},${b}`;
}

async function loadStats() {
  const d = await fetch('/api/stats').then(r=>r.json());
  document.getElementById('totalIssues').textContent = d.totalIssues.toLocaleString();
  document.getElementById('totalProjects').textContent = d.totalProjects.toLocaleString();
  if (d.lastSync) {
    document.getElementById('lastSyncCount').textContent = `${d.lastSync.issues_synced} issues`;
    document.getElementById('lastSyncTime').textContent = `Last synced ${fmtDate(d.lastSync.completed_at)}`;
  }
}

async function loadProjects() {
  const d = await fetch('/api/projects').then(r=>r.json());
  allProjects = d.projects || [];
  const pf = document.getElementById('projectFilter');
  pf.innerHTML = '<option value="">All Projects</option>' +
    allProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  renderProjects();
}

function renderProjects() {
  const q = (document.getElementById('projectSearch')?.value||'').toLowerCase();
  const filtered = allProjects.filter(p => !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q));
  document.getElementById('projectCount').textContent = `${filtered.length} projects`;

  if (!filtered.length) {
    document.getElementById('projectsGrid').innerHTML =
      `<div class="col-span-full text-center py-16 text-gray-500"><div class="text-4xl mb-3">📁</div><div class="font-medium text-gray-300">No projects found</div><div class="text-xs mt-1">Try syncing first</div></div>`;
    return;
  }

  document.getElementById('projectsGrid').innerHTML = filtered.map(p => {
    const color = p.color || '#5e6ad2';
    const rgb = hexToRgb(color);
    const stateColors = { planned:'#8b90a8', started:'#5e6ad2', paused:'#f0a030', completed:'#26b5a0', cancelled:'#e05252' };
    const sc = stateColors[(p.state||'').toLowerCase()] || '#8b90a8';
    return `
      <div class="bg-gray-900 border border-gray-700 hover:border-indigo-600 rounded-xl p-4 flex flex-col gap-3 transition-colors">
        <div class="flex items-start gap-2.5">
          <div class="w-3 h-3 rounded-full mt-1 flex-shrink-0" style="background:${color}"></div>
          <div>
            <div class="font-semibold text-gray-100">
              <a href="${p.url}" target="_blank" class="hover:text-indigo-400 transition-colors">${p.name}</a>
            </div>
          </div>
        </div>
        ${p.description ? `<div class="text-xs text-gray-400 line-clamp-2 leading-relaxed">${p.description}</div>` : ''}
        <div class="flex items-center gap-2 flex-wrap mt-auto">
          <span class="text-xs font-medium px-2 py-0.5 rounded-full" style="background:${sc}22;color:${sc}">${p.state||'unknown'}</span>
          <span class="text-xs text-gray-500">🎯 ${p.issue_count} issue${p.issue_count!='1'?'s':''}</span>
          <span class="text-xs text-gray-600 ml-auto">${fmtDate(p.updated_at)}</span>
        </div>
      </div>`;
  }).join('');
}

async function loadIssues() {
  const search = document.getElementById('issueSearch').value;
  const team = document.getElementById('teamFilter').value;
  const project = document.getElementById('projectFilter').value;
  const params = new URLSearchParams({ page: currentPage });
  if (search) params.set('search', search);
  if (team) params.set('team', team);
  if (project) params.set('project', project);

  const d = await fetch(`/api/issues?${params}`).then(r=>r.json());
  const tbody = document.getElementById('issuesBody');

  if (!d.issues?.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="text-center py-16 text-gray-500"><div class="text-4xl mb-3">📋</div><div class="font-medium text-gray-300">No issues found</div><div class="text-xs mt-1">Try syncing first or adjust filters</div></div></td></tr>`;
    document.getElementById('issueCount').textContent = '0 issues';
    document.getElementById('issuesPagination').innerHTML = '';
    return;
  }

  document.getElementById('issueCount').textContent = `${d.total.toLocaleString()} issues`;

  // Team filter
  const tf = document.getElementById('teamFilter');
  if (!tf.value) {
    const teams = [...new Set(d.issues.map(i=>i.team_name).filter(Boolean))];
    tf.innerHTML = '<option value="">All Teams</option>' + teams.map(t=>`<option value="${t}">${t}</option>`).join('');
  }

  tbody.innerHTML = d.issues.map(issue => {
    const p = PRIORITIES[issue.priority] || PRIORITIES[0];
    const sc = issue.state_color || '#8b90a8';
    const pc = issue.project_color || '#5e6ad2';
    const rgb = hexToRgb(pc);
    return `
      <tr class="border-t border-gray-800 hover:bg-gray-800/40 transition-colors">
        <td class="px-4 py-3">
          <div class="flex flex-col gap-0.5">
            <a href="${issue.url}" target="_blank" class="font-medium text-gray-100 hover:text-indigo-400 transition-colors leading-snug">${issue.title}</a>
            ${issue.team_key ? `<span class="text-xs text-gray-500 font-mono">${issue.team_key}</span>` : ''}
          </div>
        </td>
        <td class="px-4 py-3">
          ${issue.project_name
            ? `<span class="inline-flex items-center gap-1.5 text-xs font-medium px-2.5 py-1 rounded-full" style="background:rgba(${rgb},0.12);color:${pc}">
                 <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${pc}"></span>
                 ${issue.project_name}
               </span>`
            : '<span class="text-gray-600">—</span>'}
        </td>
        <td class="px-4 py-3">
          ${issue.team_name ? `<span class="text-xs text-gray-400 font-mono bg-gray-800 px-2 py-0.5 rounded">${issue.team_name}</span>` : '<span class="text-gray-600">—</span>'}
        </td>
        <td class="px-4 py-3">
          <span class="inline-flex items-center gap-1.5 text-xs">
            <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${sc}"></span>
            <span class="text-gray-300">${issue.state_name||'—'}</span>
          </span>
        </td>
        <td class="px-4 py-3 ${p.color} text-xs whitespace-nowrap">${p.icon} ${p.label}</td>
        <td class="px-4 py-3">
          ${issue.assignee_name
            ? `<div class="flex items-center gap-2">
                 <div class="w-6 h-6 rounded-full bg-indigo-900 flex items-center justify-center text-xs font-semibold text-indigo-300 flex-shrink-0">${initials(issue.assignee_name)}</div>
                 <span class="text-gray-300 text-xs">${issue.assignee_name}</span>
               </div>`
            : '<span class="text-gray-600 text-xs">Unassigned</span>'}
        </td>
        <td class="px-4 py-3 text-xs text-gray-500 whitespace-nowrap">${fmtDate(issue.updated_at)}</td>
      </tr>`;
  }).join('');

  // Pagination
  const total = Math.ceil(d.total / d.limit);
  const pg = document.getElementById('issuesPagination');
  pg.innerHTML = total > 1 ? `
    <button onclick="changePage(${currentPage-1})" ${currentPage<=1?'disabled':''} class="px-3 py-1.5 text-xs bg-gray-800 border border-gray-700 rounded-lg hover:border-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">← Prev</button>
    <span class="text-xs text-gray-500">Page ${currentPage} of ${total}</span>
    <button onclick="changePage(${currentPage+1})" ${currentPage>=total?'disabled':''} class="px-3 py-1.5 text-xs bg-gray-800 border border-gray-700 rounded-lg hover:border-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next →</button>
  ` : '';
}

function changePage(p) { currentPage = p; loadIssues(); window.scrollTo({top:0,behavior:'smooth'}); }

async function loadSyncLog() {
  const d = await fetch('/api/sync-log').then(r=>r.json());
  const c = document.getElementById('syncLog');
  if (!d.logs?.length) { c.innerHTML = '<div class="text-sm text-gray-500">No syncs yet</div>'; return; }
  const statusClasses = {
    completed: 'bg-emerald-900/40 text-emerald-400',
    running: 'bg-indigo-900/40 text-indigo-400',
    error: 'bg-red-900/40 text-red-400'
  };
  c.innerHTML = d.logs.map(log => `
    <div class="bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 flex items-center gap-4">
      <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${statusClasses[log.status]||'bg-gray-700 text-gray-400'}">${log.status}</span>
      <span class="text-xs text-gray-400">
        ${log.status==='completed'?`${log.issues_synced} issues, ${log.projects_synced} projects`:''}
        ${log.status==='error'?log.error||'Error occurred':''}
        ${log.status==='running'?'In progress...':''}
      </span>
      <span class="text-xs text-gray-600 ml-auto">${fmtDate(log.started_at)}</span>
    </div>`).join('');
}

function toast(icon, title, sub) {
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastSub').textContent = sub;
  const t = document.getElementById('toast');
  t.classList.remove('translate-y-24','opacity-0');
  t.classList.add('translate-y-0','opacity-100');
}
function hideToast() {
  const t = document.getElementById('toast');
  t.classList.add('translate-y-24','opacity-0');
  t.classList.remove('translate-y-0','opacity-100');
}

async function triggerSync() {
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  document.getElementById('btnIcon').classList.add('hidden');
  document.getElementById('btnSpinner').classList.remove('hidden');
  document.getElementById('btnLabel').textContent = 'Syncing...';
  toast('⚡', 'Sync started', 'Fetching from Linear...');
  try {
    const d = await fetch('/api/sync', {method:'POST'}).then(r=>r.json());
    activeSyncId = d.syncId;
    pollSync();
  } catch(e) { toast('❌','Sync failed',e.message); resetBtn(); }
}

async function pollSync() {
  if (!activeSyncId) return;
  try {
    const d = await fetch(`/api/sync/${activeSyncId}`).then(r=>r.json());
    if (d.progress) document.getElementById('toastSub').textContent = d.progress;
    if (d.status === 'completed') {
      toast('✅','Sync complete!',`${d.issues} issues, ${d.projects} projects`);
      setTimeout(hideToast, 4000);
      resetBtn(); loadStats(); loadIssues(); loadProjects(); loadSyncLog(); activeSyncId = null;
    } else if (d.status === 'error') {
      toast('❌','Sync failed',d.error||'Unknown error');
      setTimeout(hideToast, 5000);
      resetBtn(); loadSyncLog(); activeSyncId = null;
    } else setTimeout(pollSync, 1500);
  } catch { setTimeout(pollSync, 2000); }
}

function resetBtn() {
  document.getElementById('syncBtn').disabled = false;
  document.getElementById('btnIcon').classList.remove('hidden');
  document.getElementById('btnSpinner').classList.add('hidden');
  document.getElementById('btnLabel').textContent = 'Sync Now';
}

(async () => {
  await Promise.all([loadStats(), loadProjects(), loadSyncLog()]);
  await loadIssues();
})();
</script>
</body>
</html>
